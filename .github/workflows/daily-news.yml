name: 每日AI资讯速览

on:
  schedule:
    # 每天早上 8:00 北京时间 (UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  fetch-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行 AI 资讯脚本
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          python scripts/daily_ai_news.py

      - name: 提交并推送报告
        run: |
          git config --local user.email "daily-ai-news-bot@github.com"
          git config --local user.name "Daily AI News Bot"
          git add output/
          # 如果有新文件才提交
          git diff --cached --quiet || git commit -m "📰 每日AI资讯速览 $(date +'%Y-%m-%d')"
          git push
